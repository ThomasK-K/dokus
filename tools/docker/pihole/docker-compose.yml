version: "3.8"

services:
  # Pi-hole DNS Server
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole
    restart: unless-stopped
    
    ports:
      - "53:53/tcp"     # DNS
      - "53:53/udp"     # DNS
      - "8080:80/tcp"   # Web Interface auf Port 8080
    
    environment:
      TZ: "Europe/Berlin"
      WEBPASSWORD: "HIER_SICHERES_PASSWORT"
      
      # FritzBox übernimmt DHCP
      DHCP_ACTIVE: "false"
      
      # Upstream DNS
      PIHOLE_DNS_: "9.9.9.9;1.1.1.1"
      
      # Performance
      CACHE_SIZE: 10000
      BLOCKING_ENABLED: "true"
      
      # Conditional Forwarding zur FritzBox
      CONDITIONAL_FORWARDING: "true"
      CONDITIONAL_FORWARDING_IP: "192.168.10.11"
      CONDITIONAL_FORWARDING_DOMAIN: "fritz.box"
      CONDITIONAL_FORWARDING_REVERSE: "10.168.192.in-addr.arpa"
    
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    
    cap_add:
      - NET_ADMIN
    
    networks:
      - web-network
    
    healthcheck:
      test: ["CMD", "dig", "google.com", "@127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./web:/var/www/html:ro
    
    networks:
      - web-network
    
    depends_on:
      - pihole

networks:
  web-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
